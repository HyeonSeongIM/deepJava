version: '3.8'

services:
  app1:
    build: .
    container_name: app1
    restart: always
    environment:
      - PORT=8080
    ports:
      - "8081:8080"
    volumes:
      - ./heapdump/app1:/app/heapdump

  app2:
    build: .
    container_name: app2
    restart: always
    environment:
      - PORT=8080
    ports:
      - "8082:8080"
    volumes:
      - ./heapdump/app2:/app/heapdump

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "8090:8090"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    command:
      - --nginx.scrape-uri=http://nginx:8090/nginx_status
    ports:
      - "9113:9113"
    depends_on:
      - nginx

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
