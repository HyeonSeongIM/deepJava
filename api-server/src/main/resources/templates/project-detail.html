<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${project.title} + ' | HyeonSeong'">프로젝트 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand text-white" href="/">
            <i class="bi bi-terminal-fill text-primary me-1"></i>HyeonSeong
        </a>
        <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto gap-2">
                <li class="nav-item"><a class="nav-link text-secondary" href="/">홈</a></li>
                <li class="nav-item"><a class="nav-link text-white fw-semibold" href="/projects">프로젝트</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Header -->
<div class="detail-header">
    <div class="container">
        <a href="/projects" class="btn btn-sm btn-outline-secondary mb-3">
            <i class="bi bi-arrow-left me-1"></i>목록으로
        </a>

        <!-- Category Badge -->
        <div class="mb-2">
            <span th:if="${project.category == 'JVM'}"
                  class="badge badge-jvm rounded-pill px-3 py-2 fs-6">
                ☕ JVM
            </span>
            <span th:if="${project.category == 'OS Kernel'}"
                  class="badge badge-os rounded-pill px-3 py-2 fs-6">
                ⚙️ OS Kernel
            </span>
            <span th:unless="${project.category == 'JVM' or project.category == 'OS Kernel'}"
                  class="badge bg-secondary rounded-pill px-3 py-2 fs-6"
                  th:text="${project.category}">기타</span>
        </div>

        <h1 class="fw-bold mb-3" th:text="${project.title}">프로젝트명</h1>

        <!-- Tags -->
        <div class="mb-3">
            <span class="tag-pill"
                  th:each="tag : ${#strings.arraySplit(project.tags, ',')}"
                  th:text="${#strings.trim(tag)}">tag</span>
        </div>

        <!-- GitHub Link -->
        <a th:if="${project.github != null and !project.github.isEmpty()}"
           th:href="${project.github}"
           target="_blank"
           class="btn btn-sm btn-outline-light">
            <i class="bi bi-github me-1"></i>GitHub Repository
        </a>
    </div>
</div>

<!-- Content -->
<section class="section pt-4">
    <div class="container">
        <div class="row">
            <div class="col-lg-9">

                <!-- Summary Box -->
                <div class="p-3 mb-4 rounded"
                     style="background:rgba(13,110,253,0.08); border:1px solid rgba(13,110,253,0.25);">
                    <p class="mb-0 text-secondary" th:text="${project.summary}">요약</p>
                </div>

                <!-- Full Content -->
                <div class="detail-content">
                    <pre style="white-space:pre-wrap; font-family:inherit; font-size:0.95rem; margin:0;"
                         th:text="${project.content}">내용</pre>
                </div>

            </div>

            <!-- Sidebar -->
            <div class="col-lg-3 mt-4 mt-lg-0">
                <div class="skill-card">
                    <h6 class="fw-bold mb-3 text-secondary">프로젝트 정보</h6>
                    <div class="mb-3">
                        <small class="text-secondary d-block mb-1">카테고리</small>
                        <span class="text-white fw-semibold" th:text="${project.category}">-</span>
                    </div>
                    <div class="mb-3">
                        <small class="text-secondary d-block mb-1">기술 태그</small>
                        <div>
                            <span class="tag-pill"
                                  th:each="tag : ${#strings.arraySplit(project.tags, ',')}"
                                  th:text="${#strings.trim(tag)}">tag</span>
                        </div>
                    </div>
                    <div th:if="${project.github != null and !project.github.isEmpty()}">
                        <small class="text-secondary d-block mb-1">소스코드</small>
                        <a th:href="${project.github}" target="_blank" class="text-primary small">
                            <i class="bi bi-github me-1"></i>GitHub 바로가기
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <a href="/projects" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>프로젝트 목록으로
            </a>
        </div>
    </div>
</section>

<footer>
    <div class="container text-center">
        <p class="mb-0">&copy; 2026 HyeonSeong. Built with Spring Boot &amp; Thymeleaf.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
