events {
    worker_connections 1024;
}

http {
    upstream app {
        # Round Robin (기본값) - 요청을 app1 -> app2 -> app1 순으로 분배
        server app1:8080;
        server app2:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Served-By $upstream_addr always;
        }
    }

    # nginx-prometheus-exporter가 읽는 stub_status 엔드포인트
    server {
        listen 8090;

        location /nginx_status {
            stub_status on;
            allow all;
        }
    }
}
