server:
  port: ${PORT:8080}

alert:
  slack:
    webhook-url: ${SLACK_WEBHOOK_URL:}
  heap:
    threshold: 80          # 힙 사용률 몇 % 초과 시 알람
    check-interval-ms: 10000  # 체크 주기 (ms)

spring:
  application:
    name: deepJava

  datasource:
    url: jdbc:h2:mem:portfoliodb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  thymeleaf:
    cache: false

  jmx:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, heapdump, info, prometheus, env
  endpoint:
    heapdump:
      enabled: true
  metrics:
    enable:
      jvm: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99

jwt:
  secret-key: ${JWT_SECRET_KEY}
  expiration-ms: 3600000

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: images