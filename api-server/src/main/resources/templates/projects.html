<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 | HyeonSeong</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand text-white" href="/">
            <i class="bi bi-terminal-fill text-primary me-1"></i>HyeonSeong
        </a>
        <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto gap-2">
                <li class="nav-item"><a class="nav-link text-secondary" href="/">홈</a></li>
                <li class="nav-item"><a class="nav-link text-white fw-semibold" href="/projects">프로젝트</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Header -->
<div class="detail-header">
    <div class="container">
        <h2 class="fw-bold mb-1">프로젝트</h2>
        <p class="text-secondary mb-0">JVM 최적화, OS 커널, 시스템 프로그래밍 관련 프로젝트들입니다.</p>
    </div>
</div>

<!-- Filter -->
<div class="container mt-4">
    <div class="d-flex gap-2 flex-wrap">
        <a th:href="@{/projects}"
           th:classappend="${currentCategory == 'ALL'} ? ' active' : ''"
           class="filter-btn">ALL</a>
        <a th:href="@{/projects(category='JVM')}"
           th:classappend="${currentCategory == 'JVM'} ? ' active' : ''"
           class="filter-btn">☕ JVM</a>
        <a th:href="@{/projects(category='OS Kernel')}"
           th:classappend="${currentCategory == 'OS Kernel'} ? ' active' : ''"
           class="filter-btn">⚙️ OS Kernel</a>
    </div>
</div>

<!-- Project Cards -->
<section class="section pt-3">
    <div class="container">

        <!-- 프로젝트 없을 때 -->
        <div th:if="${#lists.isEmpty(projects)}" class="text-center py-5 text-secondary">
            <i class="bi bi-inbox" style="font-size:3rem;"></i>
            <p class="mt-2">해당 카테고리에 프로젝트가 없습니다.</p>
        </div>

        <div class="row g-4" th:unless="${#lists.isEmpty(projects)}">
            <div class="col-md-6 col-lg-4" th:each="project : ${projects}">
                <div class="project-card">
                    <!-- Category Badge -->
                    <div class="mb-2">
                        <span th:if="${project.category == 'JVM'}"
                              class="badge badge-jvm rounded-pill px-2 py-1">
                            ☕ JVM
                        </span>
                        <span th:if="${project.category == 'OS Kernel'}"
                              class="badge badge-os rounded-pill px-2 py-1">
                            ⚙️ OS Kernel
                        </span>
                        <span th:unless="${project.category == 'JVM' or project.category == 'OS Kernel'}"
                              class="badge bg-secondary rounded-pill px-2 py-1"
                              th:text="${project.category}">기타</span>
                    </div>

                    <!-- Title -->
                    <h5 class="card-title mb-2" th:text="${project.title}">프로젝트명</h5>

                    <!-- Summary -->
                    <p class="card-text mb-3" th:text="${project.summary}">요약</p>

                    <!-- Tags -->
                    <div class="mb-3">
                        <span class="tag-pill"
                              th:each="tag : ${#strings.arraySplit(project.tags, ',')}"
                              th:text="${#strings.trim(tag)}">tag</span>
                    </div>

                    <!-- Link -->
                    <a th:href="@{/projects/{id}(id=${project.id})}"
                       class="btn btn-sm btn-outline-primary mt-auto">
                        자세히 보기 <i class="bi bi-arrow-right ms-1"></i>
                    </a>
                </div>
            </div>
        </div>

    </div>
</section>

<footer>
    <div class="container text-center">
        <p class="mb-0">&copy; 2026 HyeonSeong. Built with Spring Boot &amp; Thymeleaf.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
