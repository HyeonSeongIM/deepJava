services:
  app1:
    build: .
    container_name: app1
    restart: always
    cpus: "8"
    mem_limit: 640m
    environment:
      - PORT=8080
      - JAVA_OPTS=-XX:+UseG1GC -XX:ParallelGCThreads=8 -XX:ConcGCThreads=1
    ports:
      - "8081:8080"
    volumes:
      - ./heapdump/app1:/app/heapdump
      - ./logs/app1:/app/logs

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "8090:8090"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    command:
      - --nginx.scrape-uri=http://nginx:8090/nginx_status
    ports:
      - "9113:9113"
    depends_on:
      - nginx

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)
    ports:
      - "9100:9100"

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
